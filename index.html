<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wednesday Meeting</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #111;
    height: 100vh;
  }
  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 2rem 3rem;
  }
  .nav-circles {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 1.75rem;
    justify-content: center;
    flex-shrink: 0;
  }
  .circle-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 1.5px solid #d0d0d0;
    background: #f5f5f5;
    cursor: pointer;
    font-size: 9px;
    font-weight: 500;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    line-height: 1.2;
    padding: 4px;
    transition: all 0.15s;
    white-space: pre;
    flex-shrink: 0;
  }
  .circle-btn:hover { border-color: #999; color: #111; }
  .circle-btn.active { background: #111; color: #fff; border-color: #111; }
  .slides-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .slide { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .slide.active { display: flex; }
  .slide-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
    padding-bottom: 1rem;
  }
  .section-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.6rem;
    flex-shrink: 0;
  }
  .slide-title {
    font-size: clamp(24px, 3vw, 36px);
    font-weight: 500;
    color: #111;
    margin-bottom: 1.25rem;
    line-height: 1.2;
    flex-shrink: 0;
  }
  .slide-subtitle {
    font-size: clamp(13px, 1.4vw, 16px);
    color: #888;
    margin-bottom: 1rem;
    font-style: italic;
    flex-shrink: 0;
  }
  .slide-body {
    font-size: clamp(17px, 2vw, 24px);
    color: #222;
    line-height: 1.8;
  }
  .slide-body p { margin-bottom: 1rem; }
  .slide-body ol, .slide-body ul { padding-left: 1.5rem; }
  .slide-body li { margin-bottom: 0.65rem; line-height: 1.75; }
  .prayer-text {
    font-size: clamp(20px, 2.5vw, 30px);
    line-height: 2.1;
    color: #111;
    text-align: center;
    font-family: Georgia, "Times New Roman", serif;
  }
  .page-indicator {
    font-size: 13px;
    color: #aaa;
    text-align: center;
    margin-bottom: 0.6rem;
    flex-shrink: 0;
  }
  .nav-btns {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #eee;
    padding-top: 1rem;
    flex-shrink: 0;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px 28px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    color: #111;
    transition: background 0.1s;
  }
  .nav-btn:hover { background: #f5f5f5; }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }

  /* Chips slide */
  .chips-layout {
    display: flex;
    gap: 2rem;
    flex: 1;
    overflow: hidden;
    align-items: center;
  }
  .chips-image-panel {
    flex: 0 0 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    position: relative;
  }
  .chips-image-panel img {
    max-height: 100%;
    max-width: 100%;
    object-fit: contain;
    position: absolute;
    opacity: 0;
    transform: scale(0.6) rotate(-8deg);
    pointer-events: none;
    transition: none;
  }
  @keyframes chipPop {
    0%   { opacity: 0; transform: scale(0.5) rotate(-12deg); }
    55%  { opacity: 1; transform: scale(1.08) rotate(3deg); }
    75%  { transform: scale(0.96) rotate(-1deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .chips-image-panel img.visible {
    animation: chipPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .chips-placeholder {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    border: 2px dashed #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 14px;
    text-align: center;
    padding: 1rem;
    transition: opacity 0.2s;
  }
  .chips-placeholder.hidden { opacity: 0; }
  .chips-controls {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    overflow-y: auto;
  }
  .chips-controls h2 {
    font-size: clamp(18px, 2vw, 26px);
    font-weight: 500;
    color: #111;
    margin-bottom: 0.75rem;
  }
  .milestone-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
    gap: 8px;
  }
  .milestone-btn {
    padding: 10px 6px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #f9f9f9;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #333;
    transition: all 0.12s;
    text-align: center;
  }
  .milestone-btn:hover { background: #f0f0f0; border-color: #bbb; }
  .milestone-btn.active { background: #111; color: #fff; border-color: #111; }

  /* Links slide */
  .links-list { display: flex; flex-direction: column; gap: 1.25rem; }
  .link-card {
    border: 1px solid #eee;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
    display: block;
  }
  .link-card:hover { border-color: #bbb; background: #fafafa; }
  .link-card-label {
    font-size: clamp(11px, 1.2vw, 13px);
    font-weight: 500;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 0.3rem;
  }
  .link-card-title {
    font-size: clamp(16px, 1.8vw, 22px);
    font-weight: 500;
    color: #111;
    margin-bottom: 0.2rem;
  }
  .link-card-url { font-size: clamp(12px, 1.2vw, 14px); color: #888; }

  @media (prefers-color-scheme: dark) {
    body { background: #141414; color: #eee; }
    .circle-btn { background: #222; border-color: #444; color: #aaa; }
    .circle-btn:hover { border-color: #888; color: #eee; }
    .circle-btn.active { background: #eee; color: #111; border-color: #eee; }
    .slide-title { color: #eee; }
    .section-label { color: #555; }
    .slide-subtitle { color: #777; }
    .slide-body { color: #ccc; }
    .prayer-text { color: #eee; }
    .page-indicator { color: #555; }
    .nav-btns { border-top-color: #2a2a2a; }
    .nav-btn { border-color: #333; color: #eee; }
    .nav-btn:hover { background: #222; }
    .chips-controls h2 { color: #eee; }
    .milestone-btn { background: #1e1e1e; border-color: #333; color: #ccc; }
    .milestone-btn:hover { background: #2a2a2a; border-color: #555; }
    .milestone-btn.active { background: #eee; color: #111; border-color: #eee; }
    .chips-placeholder { border-color: #333; color: #555; }
    .link-card { border-color: #2a2a2a; }
    .link-card:hover { border-color: #555; background: #1e1e1e; }
    .link-card-title { color: #eee; }
    .link-card-url { color: #666; }
  }
</style>
</head>
<body>
<div class="shell">
  <div class="nav-circles" id="navCircles"></div>
  <div class="slides-wrap" id="slides"></div>
</div>

<script>
const milestones = ['1D','1W','1M','2M','3M','4M','5M','6M','7M','8M','9M','10M','11M','1Y','18M','2Y','3Y','4Y','5Y','6Y','7Y','8Y','9Y','10Y','11Y','12Y','13Y','14Y','15Y'];

const sections = [
  {
    short: "Serenity\nPrayer",
    label: "The Serenity Prayer",
    pages: [
      { content: `<p class="prayer-text">God, grant me the<br>Serenity to accept the things I cannot change,<br>Courage to change the things I can,<br>and Wisdom to know the difference.</p>` }
    ]
  },
  {
    short: "Letter to\nNewcomers",
    label: "A Letter to Newcomers",
    pages: [
      { content: `<p>For any newcomers with us for their first meeting, welcome! We acknowledge you for the courage it took to get here. At the end there will be a time for you to ask questions and get contact information from others to support you in your recovery.</p><p>It is suggested that you attend six meetings before deciding if SAA is for you. Please know you are welcome here and do keep coming back. You have found a safe place in which to heal yourself from harmful sexual behaviours.</p>` },
      { content: `<p>Recovery meetings offer an accepting, non-judgmental environment where we can share our common struggles and learn how to apply some simple principles in our everyday lives.</p><p>The only requirement for membership is a desire to stop addictive sexual behaviours. There are no application forms or registration fees. We practise strict anonymity and confidentiality, so that our meetings are a safe place for all of us. Whoever we meet and whatever is said in a meeting is confidential and should not be disclosed to anyone else.</p>` }
    ]
  },
  {
    short: "Message\nof Hope",
    label: "A Message of Hope",
    pages: [
      { subtitle: "For sex addicts in the LGBT communities — adapted from SAA literature", content: `<p>Sex Addicts Anonymous is a spiritual program based on the principles and traditions of Alcoholics Anonymous. We are grateful to A.A. for this gift which makes our recovery possible.</p><p>Our primary purpose is to stop our addictive sexual behaviour and to help others recover from sexual addiction. Membership is open to all who have a desire to stop addictive sexual behaviour. There is no other requirement.</p>` },
      { subtitle: "For sex addicts in the LGBT communities — adapted from SAA literature", content: `<p>Our fellowship is open to anyone regardless of age, race, religion, ethnic background, marital status, or occupation. We welcome members of any sexual orientation or gender.</p><p>Many of our sexual behaviours produced negative consequences. These behaviours are not gender specific and may cross lines of sexual orientation.</p>` },
      { subtitle: "For sex addicts in the LGBT communities — adapted from SAA literature", content: `<p>For many of us, the spiral of sexual addiction led to what we called "hitting rock bottom" — to reach such a low point mentally, physically, emotionally, and spiritually that we break through our denial.</p><p>We now use our sense of surrender in a healthy manner. Now we start to surrender and become teachable, to a healthier way of life filled with hope, growth, and change.</p>` }
    ]
  },
  {
    short: "12\nSteps",
    label: "The Twelve Steps of SAA",
    pages: [
      { subtitle: "Sex Addicts Anonymous, p. 20–21", content: `<ol start="1"><li>We admitted we were powerless over addictive sexual behaviour — that our lives had become unmanageable.</li><li>Came to believe that a Power greater than ourselves could restore us to sanity.</li><li>Made a decision to turn our will and our lives over to the care of God as we understood God.</li><li>Made a searching and fearless moral inventory of ourselves.</li></ol>` },
      { subtitle: "Sex Addicts Anonymous, p. 20–21", content: `<ol start="5"><li>Admitted to God, to ourselves, and to another human being the exact nature of our wrongs.</li><li>Were entirely ready to have God remove all these defects of character.</li><li>Humbly asked God to remove our shortcomings.</li><li>Made a list of all persons we had harmed and became willing to make amends to them all.</li></ol>` },
      { subtitle: "Sex Addicts Anonymous, p. 20–21", content: `<ol start="9"><li>Made direct amends to such people wherever possible, except when to do so would injure them or others.</li><li>Continued to take personal inventory and when we were wrong promptly admitted it.</li><li>Sought through prayer and meditation to improve our conscious contact with God as we understood God, praying only for knowledge of God's will for us and the power to carry that out.</li><li>Having had a spiritual awakening as the result of these steps, we tried to carry this message to other sex addicts and to practise these principles in our lives.</li></ol>` }
    ]
  },
  {
    short: "12\nTraditions",
    label: "The Twelve Traditions of SAA",
    pages: [
      { subtitle: "Sex Addicts Anonymous, p. 77", content: `<ol start="1"><li>Our common welfare should come first; personal recovery depends upon SAA unity.</li><li>For our group purpose there is but one ultimate authority — a loving God as expressed in our group conscience. Our leaders are but trusted servants; they do not govern.</li><li>The only requirement for SAA membership is a desire to stop addictive sexual behaviour.</li><li>Each group should be autonomous except in matters affecting other groups or SAA as a whole.</li></ol>` },
      { subtitle: "Sex Addicts Anonymous, p. 77", content: `<ol start="5"><li>Each group has but one primary purpose — to carry its message to the sex addict who still suffers.</li><li>An SAA group ought never endorse, finance, or lend the SAA name to any related facility or outside enterprise, lest problems of money, property, and prestige divert us from our primary purpose.</li><li>Every SAA group ought to be fully self-supporting.</li><li>SAA should remain forever nonprofessional, but our service centres may employ special workers.</li></ol>` },
      { subtitle: "Sex Addicts Anonymous, p. 77", content: `<ol start="9"><li>SAA, as such, ought never be organised; but we may create service boards or committees directly responsible to those they serve.</li><li>SAA has no opinion on outside issues; hence the SAA name ought never be drawn into public controversy.</li><li>Our public relations policy is based on attraction rather than promotion; we need always maintain personal anonymity at the level of press, radio, TV, and films.</li><li>Anonymity is the spiritual foundation of all our traditions, ever reminding us to place principles before personalities.</li></ol>` }
    ]
  },
  {
    short: "Abstinence\nStatement",
    label: "Abstinence Statement",
    pages: [
      { content: `<p>Our goal when entering SAA is abstinence from one or more specific sexual behaviors. But unlike programs for recovering alcoholics or drug addicts, Sex Addicts Anonymous does not have a universal definition of abstinence. Most of us have no desire to stop being sexual altogether. It is not sex in and of itself that causes us problems, but the addiction to certain sexual behaviors.</p><p>We are individuals, and our addictive behaviors, while similar, are unique to us. What may be healthy for one member could be clearly addictive for another.</p>` },
      { content: `<p>We carefully consider which behaviors we feel powerless to stop, and which sexual acts lead to feelings of demoralization or other negative consequences. We also consider which sexual behaviors are acceptable to us, or even experienced with a sense of gratitude and enjoyment.</p><p>We have learned that our ideas of what is healthy and what is addictive evolve with experience. In time, we are able to define our individual abstinence with honesty, fairness, and gentleness.</p>` }
    ]
  },
  {
    short: "Chips",
    label: "Chips",
    type: "chips",
    pages: [{ content: "" }]
  },
  {
    short: "Links",
    label: "Links",
    type: "links",
    pages: [{ content: "" }]
  },
  {
    short: "Keep\nComing Back",
    label: "Keep Coming Back",
    pages: [
      { content: `<p>We have had to work at staying sexually sober, as well as rebuilding our lives and relationships. Sometimes the steps seemed overwhelming. But we found that we had several things working in our favor. We had time and energy available that we used to waste on our addiction. We had our new friends in recovery. And most importantly, we had the God of our understanding to sustain us.</p><p>Through the program, we were able to face problems that we never had the courage to face before, and to do things we never imagined possible.</p>` },
      { content: `<p>Each of us has taken steps of courage and leaps of faith. Each of us has contributed, not only to our own recovery, but to the recovery of other suffering sex addicts as well. We have contributed by showing up at meetings and by sharing our experience, strength, and hope.</p><p>We have listened to our fellow addicts and supported them in their recovery journey. Like the first members of our fellowship, we continue to remain sexually sober by helping our fellow addicts stay sober. Our prayer is that every sex addict who seeks recovery will have the opportunity to find it.</p><p style="font-weight:500;font-style:italic;">And keep coming back.</p>` }
    ]
  },
  {
    short: "The\nPromises",
    label: "The Promises",
    pages: [
      { subtitle: "Alcoholics Anonymous, p. 83–84", content: `<p>If we are painstaking about this phase of our development, we will be amazed before we are half way through.</p><ul><li>We are going to know a new freedom and a new happiness.</li><li>We will not regret the past nor wish to shut the door on it.</li><li>We will comprehend the word serenity and we will know peace.</li><li>No matter how far down the scale we have gone, we will see how our experience can benefit others.</li><li>That feeling of uselessness and self-pity will disappear.</li></ul>` },
      { subtitle: "Alcoholics Anonymous, p. 83–84", content: `<ul><li>We will lose interest in selfish things and gain interest in our fellows.</li><li>Self-seeking will slip away.</li><li>Our whole attitude and outlook upon life will change.</li><li>Fear of people and of economic insecurity will leave us.</li><li>We will intuitively know how to handle situations which used to baffle us.</li><li>We will suddenly realise that God is doing for us what we could not do for ourselves.</li></ul>` },
      { subtitle: "Alcoholics Anonymous, p. 83–84", content: `<p>Are these extravagant promises? We think not.</p><p>They are being fulfilled among us — sometimes quickly, sometimes slowly. They will always materialise if we work for them.</p>` }
    ]
  }
];

let flat = [];
sections.forEach((sec, si) => {
  sec.pages.forEach((page, pi) => {
    flat.push({ si, pi, total: sec.pages.length, short: sec.short, label: sec.label, subtitle: page.subtitle || null, content: page.content, type: sec.type || 'text' });
  });
});

let cur = 0;
const navEl = document.getElementById("navCircles");
const slidesEl = document.getElementById("slides");

sections.forEach((sec, si) => {
  const btn = document.createElement("button");
  btn.className = "circle-btn";
  btn.textContent = sec.short;
  btn.onclick = () => go(flat.findIndex(s => s.si === si));
  navEl.appendChild(btn);
});

function buildChipsSlide(idx) {
  const div = document.createElement("div");
  div.className = "slide";
  div.id = "s" + idx;
  div.innerHTML = `
    <div class="slide-inner" style="justify-content:flex-start;padding-top:0.5rem;">
      <div class="section-label">Chips</div>
      <div class="chips-layout">
        <div class="chips-image-panel" id="chipsImgPanel">
          <div class="chips-placeholder" id="chipsPlaceholder">Select a milestone to reveal the chip</div>
          ${milestones.map(m => `<img id="chip-${m}" src="chips/${m}.png" alt="${m} chip">`).join('')}
        </div>
        <div class="chips-controls">
          <h2>What milestone are we celebrating?</h2>
          <div class="milestone-grid">
            ${milestones.map(m => `<button class="milestone-btn" onclick="showChip('${m}',this)">${m}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="go(${idx-1})" ${idx===0?"disabled":""}>← Back</button>
      <button class="nav-btn" onclick="go(${idx+1})" ${idx===flat.length-1?"disabled":""}>Next →</button>
    </div>`;
  return div;
}

function buildLinksSlide(idx) {
  const div = document.createElement("div");
  div.className = "slide";
  div.id = "s" + idx;
  div.innerHTML = `
    <div class="slide-inner">
      <div class="section-label">Links</div>
      <div class="slide-title">Links</div>
      <div class="links-list">
        <a class="link-card" href="https://saa-recovery.org/literature/voices-recovery-daily-meditation-book/" target="_blank" rel="noopener">
          <div class="link-card-label">Voices in Recovery</div>
          <div class="link-card-title">Voices of Recovery — Daily Meditation Book</div>
          <div class="link-card-url">saa-recovery.org</div>
        </a>
        <a class="link-card" href="https://saa-recovery.org/literature/sex-addicts-anonymous-green-book-saas-basic-text/" target="_blank" rel="noopener">
          <div class="link-card-label">Green Book</div>
          <div class="link-card-title">Sex Addicts Anonymous — SAA's Basic Text</div>
          <div class="link-card-url">saa-recovery.org</div>
        </a>
      </div>
    </div>
    <div class="nav-btns">
      <button class="nav-btn" onclick="go(${idx-1})" ${idx===0?"disabled":""}>← Back</button>
      <button class="nav-btn" onclick="go(${idx+1})" ${idx===flat.length-1?"disabled":""}>Next →</button>
    </div>`;
  return div;
}

flat.forEach((slide, idx) => {
  let div;
  if (slide.type === 'chips') {
    div = buildChipsSlide(idx);
  } else if (slide.type === 'links') {
    div = buildLinksSlide(idx);
  } else {
    div = document.createElement("div");
    div.className = "slide";
    div.id = "s" + idx;
    const pager = slide.total > 1 ? `<div class="page-indicator">${slide.pi + 1} of ${slide.total}</div>` : "";
    const sub = slide.subtitle ? `<div class="slide-subtitle">${slide.subtitle}</div>` : "";
    div.innerHTML = `
      <div class="slide-inner">
        <div class="section-label">${slide.short.replace("\n"," ")}</div>
        <div class="slide-title">${slide.label}</div>
        ${sub}
        <div class="slide-body">${slide.content}</div>
      </div>
      ${pager}
      <div class="nav-btns">
        <button class="nav-btn" onclick="go(${idx-1})" ${idx===0?"disabled":""}>← Back</button>
        <button class="nav-btn" onclick="go(${idx+1})" ${idx===flat.length-1?"disabled":""}>Next →</button>
      </div>`;
  }
  slidesEl.appendChild(div);
});

function showChip(milestone, btn) {
  // Hide all chips
  document.querySelectorAll('.chips-image-panel img').forEach(img => {
    img.classList.remove('visible');
  });
  document.querySelectorAll('.milestone-btn').forEach(b => b.classList.remove('active'));

  // Hide placeholder
  const placeholder = document.getElementById('chipsPlaceholder');
  placeholder.classList.add('hidden');

  // Trigger animation by removing and re-adding class
  const img = document.getElementById('chip-' + milestone);
  if (img) {
    // Force reflow to restart animation
    void img.offsetWidth;
    img.classList.add('visible');
  }
  btn.classList.add('active');
}

function go(idx) {
  if (idx < 0 || idx >= flat.length) return;
  document.getElementById("s"+cur).classList.remove("active");
  cur = idx;
  document.getElementById("s"+cur).classList.add("active");
  navEl.querySelectorAll(".circle-btn").forEach((btn, si) => {
    btn.classList.toggle("active", flat[cur].si === si);
  });
}

go(0);
</script>
</body>
</html>
